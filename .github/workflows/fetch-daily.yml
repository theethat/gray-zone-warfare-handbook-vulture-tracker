permissions:
  contents: write

name: Fetch Vulture Daily

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    env:
      VULTURE_API_KEY: ${{ secrets.VULTURE_API_KEY }}  # ✅ ใช้ secret
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install puppeteer
      
      - name: Fetch and send Vulture data
        run: node fetch-vulture.js
