permissions:
  contents: write  # ✅ เพิ่มนี่ เพื่อให้ workflow มีสิทธิ์ push

name: Fetch Vulture Daily

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # ✅ อัปเกรดเป็น v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4  # ✅ อัปเกรดเป็น v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install puppeteer
      
      - name: Fetch Vulture data
        run: node fetch-vulture.js
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vulture-log.txt
          git commit -m "📍 Update Vulture locations - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push
