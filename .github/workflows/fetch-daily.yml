name: Fetch Vulture Daily

# ตั้งเวลาให้รันเองวันละครั้ง
on:
  schedule:
    # 08:00 UTC ทุกวัน (= 15:00 Bangkok time)
    - cron: '0 8 * * *'
  
  # ให้รันได้เมื่อกด manual ใน Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Clone repo มาลงเครื่อง
      - name: Checkout repository
        uses: actions/checkout@v3
      
      # Step 2: ตั้ง Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      # Step 3: ติดตั้ง Puppeteer
      - name: Install dependencies
        run: npm install puppeteer
      
      # Step 4: รัน script
      - name: Fetch Vulture data
        run: node fetch-vulture.js
      
      # Step 5: Push ข้อมูลไปกลับยัง repo
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vulture-log.txt
          git commit -m "📍 Update Vulture locations - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push
